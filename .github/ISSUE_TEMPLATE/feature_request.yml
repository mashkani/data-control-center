name: Feature request
description: Suggest an improvement for local Data Control Center workflows.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What local workflow is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Data Control Center is local-only.
      options:
        - Local workstation workflow
        - Documentation or examples
        - Developer tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
